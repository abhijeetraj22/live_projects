    <!-- ===== OCR CARD (UNCHANGED) ===== -->
    <div class="card">
      <h1>📄 PDF → Excel</h1>
      <div class="subtitle">Upload a PDF and download structured Excel.</div>

      <label class="file-box file-label" id="file-label">
        <img src="assets/images/pdf.png" alt="PDF file" class="pdf-icon" />
        <div id="file-label-text">Select PDF file</div>
        <input type="file" id="pdfFile" accept="application/pdf" />
      </label>
      <div class="controls">
        <input type="number" id="startPage" min="1" placeholder="Start Page" />
        <input type="number" id="endPage" min="1" placeholder="End Page" />
      </div>

      <div class="extraction-type">
        <label>Select PDF Type</label>

        <select id="pdfType">
          <option value="text">Text PDF</option>
          <option value="image">Image / Scanned PDF</option>
        </select>
      </div>

      <!-- TEXT METHODS -->
      <div class="mode-buttons" id="textMethods">
        <div class="button-row">
          <button class="btn method-btn" data-method="grid">
            Grid Detection
          </button>
          <button class="btn method-btn" data-method="lattice">Lattice</button>
        </div>

        <div class="button-row">
          <button class="btn method-btn" data-method="stream">Stream</button>
          <button class="btn method-btn" data-method="text">Text</button>
        </div>
      </div>

      <!-- IMAGE METHODS -->
      <div class="mode-buttons" id="imageMethods" style="display: none">
        <div class="button-row">
          <button class="btn method-btn" data-method="ocr">OCR</button>
          <button class="btn method-btn" data-method="hybrid">Hybrid</button>
        </div>
      </div>

      <!-- CONVERT BUTTONS -->
      <div class="mode-buttons">
        <div class="button-row">
          <button class="btn" id="singleSheet">
            <i class="fa fa-file-excel"></i> Convert (Single Sheet)
          </button>

          <button class="btn" id="multiSheet">
            <i class="fa fa-table"></i> Convert (Multiple Sheets)
          </button>
        </div>
      </div>
      <div class="selected-method" id="selectedMethodBox">
        Selected Extraction: <span id="selectedMethodText">Grid Detection</span>
      </div>
      <div class="status" id="status"></div>

      <div class="download" id="downloadBox" style="display: none">
        <button type="button" class="btn" id="downloadBtn">
          ⬇ Download Excel
        </button>
      </div>

      <!-- ===== Secure OCR Processing • Token Based • FastAPI ===== -->
