    <!-- MAIN CARD -->
    <div class="card">
      <h1>📊 CBSE Data Parser</h1>
      <div class="subtitle">TXT / PDF → Excel (Grade 10 / 12)</div>

      <!-- MODE BUTTONS -->
      <div class="form-group" style="display: flex; gap: 10px">
        <button class="btn" id="txtModeBtn">📄 TXT Parser</button>
        <button class="btn" id="pdfModeBtn">📑 PDF Extractor</button>
      </div>

      <!-- GRADE -->
      <div class="form-group" id="gradeBox">
        <select id="grade">
          <option value="10">Grade 10</option>
          <option value="12">Grade 12</option>
        </select>
      </div>

      <!-- TXT INPUT -->
      <div class="form-group" id="txtSection">
        <label class="file-box file-label">
          <img src="assets/images/text.png" class="pdf-icon" />
          <div id="txt-label">Select TXT file</div>
          <input type="file" id="txtFile" accept=".txt" />
        </label>
      </div>

      <!-- ===== PDF FLOW START ===== -->

      <!-- STEP 1: PDF TYPE -->
      <div id="pdfTypeBox" style="display: none; margin-top: 10px">
        <button class="btn" id="regBtn">REGIST</button>
        <button class="btn" id="locBtn">LOC</button>
      </div>

      <!-- STEP 2: PDF UPLOAD -->
      <div class="form-group" id="pdfUploadBox" style="display: none">
        <label class="file-box file-label">
          <img src="assets/images/pdf.png" class="pdf-icon" />
          <div id="pdfFileName">Select PDF file</div>
          <input type="file" id="pdfFile" accept=".pdf" />
        </label>

        <button class="btn" id="convertPdfBtn" style="margin-top: 10px">
          <i class="fa fa-gear"></i> Convert PDF
        </button>
      </div>

      <!-- ===== PDF FLOW END ===== -->

      <!-- SAMPLE INPUT (TXT ONLY) -->
      <textarea
        id="sampleLine"
        placeholder="Paste sample student line here"
        style="width: 100%; height: 100px; margin-top: 10px"
      ></textarea>

      <!-- PROCESS BUTTON (TXT ONLY) -->
      <button class="btn" id="processBtn">
        <i class="fa fa-gear"></i> Generate Excel
      </button>

      <!-- STATUS -->
      <div class="status" id="status"></div>

      <!-- DOWNLOAD -->
      <div class="download" id="downloadBox" style="display: none">
        <button class="btn" id="downloadBtn">⬇ Download Excel File</button>
      </div>
